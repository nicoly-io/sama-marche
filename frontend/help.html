<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centre d'aide - Sama-Marche</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        body { background: #f5f7fb; font-family: 'Inter', sans-serif; }
        .page-card { max-width: 800px; margin: 2rem auto; background: white; border-radius: 24px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .contact-info { background: #F3F4F6; padding: 1rem; border-radius: 16px; margin: 1.5rem 0; text-align: center; }
        body.dark-mode .contact-info { background: #374151; }
        .contact-info a { color: #0D9488; text-decoration: none; font-size: 1.2rem; }
        .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; background: #0D9488; color: white; padding: 0.5rem 1rem; border-radius: 50px; text-decoration: none; margin-bottom: 1rem; }
    </style>

<body>
    <header class="header"><div class="container"><div class="header-content"><a href="index.html" class="logo">Sama-<span>Marche</span></a></div></div></header>

            <div class="contact-info">
                <p><i class="fas fa-phone-alt"></i> <a href="tel:+221767979987">76 797 99 87</a></p>
                <p><i class="fas fa-envelope"></i> <a href="mailto:support@sama-marche.sn">support@sama-marche.sn</a></p>
            </div>
            <h2>Horaires</h2>
            <p>Lundi - Samedi : 9h - 18h</p>

            <p>Nous nous engageons à répondre à toutes vos demandes dans les 24 heures.</p>
        </div>
    </main>
    <script src="js/app.js"></script>
