<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier l'annonce - Sama-Marche</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">Sama-<span>Marche</span></a>
                <div class="flex items-center gap-2">
                    <span id="userName" style="font-size: 0.875rem;"></span>
                    <button id="logoutBtn" class="btn btn-outline btn-sm">Déconnexion</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="padding: 2rem 0; max-width: 600px;">
        <div class="card">
            <div class="card-header">
                <h3>Modifier l'annonce</h3>
            </div>
            <div class="card-body">
                <form id="editListingForm">
                    <div class="form-group">
                        <label class="form-label">Titre *</label>
                        <input type="text" id="title" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-textarea" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Catégorie</label>
                        <select id="category" class="form-select">
                            <option value="phones">Téléphones</option>
                            <option value="electronics">Électronique</option>
                            <option value="fashion">Mode</option>
                            <option value="vehicles">Véhicules</option>
                            <option value="real-estate">Immobilier</option>
                            <option value="other">Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">État</label>
                        <select id="condition" class="form-select">
                            <option value="new">Neuf</option>
                            <option value="like_new">Comme neuf</option>
                            <option value="good">Bon état</option>
                            <option value="fair">État correct</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Prix (FCFA) *</label>
                        <input type="number" id="sellerPrice" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quartier *</label>
                        <input type="text" id="quartier" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ville</label>
                        <input type="text" id="ville" class="form-input">
                    </div>
                    <div id="errorMsg" class="form-error" style="display: none;"></div>
                    <button type="submit" class="btn btn-primary btn-block">Mettre à jour</button>
                    <button type="button" id="cancelBtn" class="btn btn-outline btn-block" style="margin-top: 0.5rem;">Annuler</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/edit-listing.js"></script>
</body>
</html>
